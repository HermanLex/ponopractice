<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5"
    />
    <meta name="theme-color" content="#0c1222" />
    <title>Family table — Pono Practice</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="app ttp-table-page">
      <header class="landing-header">
        <a class="ttp-table-page__back" href="index.html">← Back to decks</a>
        <h1>Family table</h1>
        <p>Child names in the first column; parents in the second (same data as the flashcards).</p>
      </header>
      <div id="ttp-tables-root" class="ttp-tables-root"></div>
    </div>

    <script src="../js/data.js"></script>
    <script>
      (function () {
        "use strict";
        var deckIds = ["nayas-bday-friends", "ttp-focus-1"];
        var allDecks = window.DECKS || [];
        var root = document.getElementById("ttp-tables-root");
        if (!root) return;

        deckIds.forEach(function (deckId) {
          var deck = allDecks.find(function (d) {
            return d.id === deckId;
          });
          if (!deck || !deck.cards || !deck.cards.length) return;

          var section = document.createElement("section");
          section.className = "ttp-table-section";

          var h2 = document.createElement("h2");
          h2.textContent = deck.title;
          section.appendChild(h2);

          var count = document.createElement("p");
          count.className = "counter";
          count.textContent = deck.cards.length + " " + (deck.cards.length === 1 ? "row" : "rows");
          section.appendChild(count);

          var wrap = document.createElement("div");
          wrap.className = "ttp-table-wrap";

          var table = document.createElement("table");
          table.className = "ttp-records-table";

          var thead = document.createElement("thead");
          var hr = document.createElement("tr");
          ["Child", "Parents"].forEach(function (label) {
            var th = document.createElement("th");
            th.setAttribute("scope", "col");
            th.textContent = label;
            hr.appendChild(th);
          });
          thead.appendChild(hr);
          table.appendChild(thead);

          var tbody = document.createElement("tbody");
          deck.cards.forEach(function (card) {
            var tr = document.createElement("tr");
            var thChild = document.createElement("th");
            thChild.setAttribute("scope", "row");
            thChild.textContent = card.back;
            var tdParents = document.createElement("td");
            tdParents.textContent = card.front;
            tr.appendChild(thChild);
            tr.appendChild(tdParents);
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);

          wrap.appendChild(table);
          section.appendChild(wrap);
          root.appendChild(section);
        });
      })();
    </script>
  </body>
</html>
